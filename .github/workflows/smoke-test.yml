name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 9am UTC — catches dependency rot early
    - cron: "0 9 * * 1"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CLI dependencies
        working-directory: packages/cli
        run: npm install

      - name: Export PDF
        working-directory: packages/cli
        run: |
          node bin/mdexport.js export ../../test/smoke.md --output /tmp/smoke.pdf
          if [ ! -s /tmp/smoke.pdf ]; then
            echo "PDF output is empty or missing"
            exit 1
          fi
          SIZE=$(stat --format=%s /tmp/smoke.pdf)
          echo "PDF exported: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "PDF suspiciously small (${SIZE} bytes)"
            exit 1
          fi

      - name: Export DOCX
        working-directory: packages/cli
        run: |
          node bin/mdexport.js export ../../test/smoke.md --format docx --output /tmp/smoke.docx
          if [ ! -s /tmp/smoke.docx ]; then
            echo "DOCX output is empty or missing"
            exit 1
          fi
          SIZE=$(stat --format=%s /tmp/smoke.docx)
          echo "DOCX exported: ${SIZE} bytes"
          if [ "$SIZE" -lt 500 ]; then
            echo "DOCX suspiciously small (${SIZE} bytes)"
            exit 1
          fi

      - name: Export with options
        working-directory: packages/cli
        run: |
          node bin/mdexport.js export ../../test/smoke.md \
            --theme editorial \
            --font serif \
            --toc \
            --cover \
            --cover-title "Smoke Test" \
            --page-numbers \
            --margins wide \
            --output /tmp/smoke-full.pdf
          if [ ! -s /tmp/smoke-full.pdf ]; then
            echo "Full-options PDF is empty or missing"
            exit 1
          fi
          echo "Full-options PDF exported: $(stat --format=%s /tmp/smoke-full.pdf) bytes"

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension dependencies
        working-directory: packages/vscode-extension
        run: npm install

      - name: Type check
        working-directory: packages/vscode-extension
        run: npx tsc --noEmit
